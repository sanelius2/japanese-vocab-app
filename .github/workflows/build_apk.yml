name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 必须在 buildozer 之前设置 Java，确保 JAVA_HOME 指向 temurin-17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java version
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Cache Buildozer & Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            ccache libsqlite3-dev \
            lld build-essential \
            libltdl-dev

      - name: Install buildozer & Cython
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Download JMdict & build offline dictionary
        run: |
          echo "⬇️  下载 JMdict..."
          curl -L --retry 5 --retry-delay 10 \
            -o JMdict.gz \
            "http://ftp.edrdg.org/pub/Nihongo/JMdict.gz"
          ls -lh JMdict.gz

          echo "🔨 构建词典数据库..."
          python3 build_dict.py

          ls -lh jmdict.db
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('jmdict.db')
          print('词条数:', conn.execute('SELECT COUNT(*) FROM entries').fetchone()[0])
          conn.close()
          "

      - name: Build APK with Buildozer
        run: |
          # 用 readlink 确保 JAVA_HOME 指向 setup-java 设置的 Java 17
          export JAVA_HOME="$(dirname $(dirname $(readlink -f $(which java))))"
          echo "Using JAVA_HOME=$JAVA_HOME"
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "--- buildozer exit: $BUILD_EXIT ---"
          exit $BUILD_EXIT

      - name: Check APK output
        if: always()
        run: |
          echo "=== 查找 APK ==="
          find . -name "*.apk" 2>/dev/null || echo "未找到任何 APK"
          echo "=== bin/ 目录 ==="
          ls -lh bin/ 2>/dev/null || echo "bin/ 不存在"
          echo "=== 日志末尾 200 行 ==="
          tail -200 build.log || true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: japanese-vocab-apk
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
