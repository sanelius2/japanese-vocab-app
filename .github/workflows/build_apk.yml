name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            ccache libsqlite3-dev lld build-essential

      - name: Install buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      # ── 词典：下载 JMdict 并在本地构建 jmdict.db ──
      - name: Download JMdict & build offline dictionary
        run: |
          echo "⬇️  下载 JMdict 多语言版..."
          curl -L --retry 5 --retry-delay 10 \
            -o JMdict.gz \
            "http://ftp.edrdg.org/pub/Nihongo/JMdict.gz"
          ls -lh JMdict.gz

          echo "🔨 构建 SQLite 词典数据库..."
          python3 build_dict.py

          echo "✅ 词典构建完成："
          ls -lh jmdict.db
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('jmdict.db')
          c = conn.cursor()
          c.execute('SELECT COUNT(*) FROM entries')
          print(f'  词条数: {c.fetchone()[0]}')
          conn.close()
          "

      - name: Build APK with Buildozer
        run: |
          buildozer android debug 2>&1 | tee build.log | tail -80

      - name: Show build result
        if: always()
        run: |
          echo "=== APK 文件 ==="
          find bin/ -name "*.apk" 2>/dev/null && ls -lh bin/*.apk || echo "未找到 APK"
          echo "=== 构建日志末尾 ==="
          tail -30 build.log || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: japanese-vocab-apk
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
